<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Data Types - Demo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; background: #f0f8ff; }
        h1 { color: #007acc; }
        pre { background: #e0f7fa; padding: 1em; border-radius: 8px; }
    </style>
<body>
    <script>
        // String
        let name = "Sofia";
        let greeting = 'Hello';
        let message = `Hi ${name}`;  // Template literal

        // Number (integers and decimals)
        let age = 21;
        let price = 23.99;

        // Boolean
        let isActive = true;
        let isLoggedIn = false;

        // Undefined (no value assigned)
        let unknown;

        // Null (intentionally empty)
        let empty = null;

        console.log("String:", name, greeting, message);
        console.log("Number:", age, price);
        console.log("Boolean:", isActive, isLoggedIn);
        console.log("Undefined:", unknown);
        console.log("Null:", empty);
    </script>
</body>
