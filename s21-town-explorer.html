<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MA Town Explorer</title>
</head>
<body>

  <h1>MA Town Explorer</h1>

  <input type="text" id="searchBox" placeholder="Search by town name..." oninput="filterTowns()">

  <p id="matchCount"></p>
  <p id="loading" style="display:none;">Loading...</p>
  <p id="error"></p>

  <h2>Towns</h2>
  <ul id="townList"></ul>

  <!-- Bonus -->
  <h2>Largest Town by Population</h2>
  <p id="largestTown"></p>

  <script>
    let allTowns = [];

    async function fetchTowns() {
      document.getElementById("loading").style.display = "block";

      try {
        const response = await fetch("https://oim.108122.xyz/mass");
        const data = await response.json();
        allTowns = data;

        displayTowns(allTowns.slice(0, 10));
        showLargest(allTowns);
      } catch (error) {
        document.getElementById("error").textContent = "Error: " + error.message;
      }

      document.getElementById("loading").style.display = "none";
    }

    function displayTowns(towns) {
      const list = document.getElementById("townList");
      list.innerHTML = "";

      document.getElementById("matchCount").textContent = "Showing " + towns.length + " town(s)";

      for (let i = 0; i < towns.length; i++) {
        const town = towns[i];
        const li = document.createElement("li");
        li.textContent = town.name + " — " + town.county + " County — Pop: " + town.population;
        list.appendChild(li);
      }
    }

    function filterTowns() {
      const query = document.getElementById("searchBox").value.toLowerCase();
      const filtered = allTowns.filter(town => town.name.toLowerCase().includes(query));
      displayTowns(filtered);
    }

    function showLargest(towns) {
      let largest = towns[0];
      for (let i = 1; i < towns.length; i++) {
        if (towns[i].population > largest.population) {
          largest = towns[i];
        }
      }
      document.getElementById("largestTown").textContent =
        largest.name + " — " + largest.county + " County — Pop: " + largest.population;
    }

    fetchTowns();
  </script>

</body>
</html>
