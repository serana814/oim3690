<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Grade Calculator</title>
</head>
<body>
	<h2>Grade Calculator</h2>
	<input id="scoreInput" type="number" placeholder="Enter your score">
	<button onclick="showGrade()">Get Grade</button>
	<p id="result"></p>

	<script>
		function getGrade(score) {
			if (score >= 90) {
				return "A";
			} else if (score >= 80) {
				return "B";
			} else if (score >= 70) {
				return "C";
			} else if (score >= 60) {
				return "D";
			} else {
				return "F";
			}
		}

		function showGrade() {
			var input = document.getElementById('scoreInput');
			var value = input.value.trim();
			var result = document.getElementById('result');
			result.style.color = '';
			if (value === "") {
				result.textContent = "Please enter a score";
				return;
			}
			var score = Number(value);
			if (isNaN(score)) {
				result.textContent = "Please enter a score";
				return;
			}
			if (score < 0 || score > 100) {
				result.textContent = "Score must be between 0-100";
				return;
			}
			var grade = getGrade(score);
			result.textContent = "Your grade is: " + grade;
			if (grade === "A" || grade === "B") {
				result.style.color = "green";
			} else if (grade === "D" || grade === "F") {
				result.style.color = "red";
			} else {
				result.style.color = "";
			}
		}
	</script>
</body>
</html>
