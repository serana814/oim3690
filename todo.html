
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Todo App</title>
	<style>
		body {
			font-family: 'Times New Roman', Times, serif;
			font-weight: normal;
			background: linear-gradient(120deg, #f6f5f2 0%, #f3ede7 100%);
			margin: 0;
			padding: 0;
			display: flex;
			justify-content: center;
			align-items: flex-start;
			min-height: 100vh;
		}
		.todo-container {
			background: #fffaf6;
			padding: 2.2rem 1.7rem 1.7rem 1.7rem;
			margin-top: 3rem;
			border-radius: 14px;
			box-shadow: 0 2px 16px rgba(180, 160, 120, 0.07);
			width: 100%;
			max-width: 440px;
			transition: box-shadow 0.2s;
			border: 1.5px solid #f0e7da;
		}
		.all-lists-section {
			display: flex;
			flex-wrap: wrap;
			gap: 0.7rem;
			margin-bottom: 1.2rem;
			justify-content: flex-start;
		}
		.list-box {
			background: #f7f3ee;
			border: 1.5px solid #e7dfd3;
			border-radius: 8px;
			padding: 0.5rem 1rem;
			min-width: 90px;
			font-size: 1rem;
			color: #6d5c3d;
			cursor: pointer;
			transition: background 0.18s, border 0.18s;
			display: flex;
			flex-direction: column;
			align-items: center;
		}
		.list-box.selected {
			background: #f3ede7;
			border: 2px solid #c8bfae;
			font-weight: bold;
		}
		.list-box .list-name {
			font-size: 1.05rem;
			margin-bottom: 0.2rem;
		}
		.list-box .list-count {
			font-size: 0.92rem;
			color: #b8a88a;
		}
		.todo-container:hover {
			box-shadow: 0 6px 28px rgba(180, 160, 120, 0.13);
		}
		h1 {
			text-align: center;
			color: #6d5c3d;
			font-weight: bold;
			letter-spacing: 0.5px;
			margin-bottom: 1.2rem;
		}
		.list-controls {
			display: flex;
			gap: 0.5rem;
			margin-bottom: 1.2rem;
			justify-content: center;
		}
		.list-select, .list-input, .list-add-btn {
			font-family: inherit;
			font-size: 1rem;
			border-radius: 6px;
			border: 1px solid #e7dfd3;
			padding: 0.4rem 0.7rem;
			background: #f7f3ee;
			color: #6d5c3d;
		}
		.list-select:focus, .list-input:focus {
			outline: none;
			border-color: #c8bfae;
		}
		.list-add-btn {
			background: #f3ede7;
			border: 1px solid #e7dfd3;
			color: #6d5c3d;
			cursor: pointer;
			padding: 0.4rem 0.9rem;
			transition: background 0.2s;
		}
		.list-add-btn:hover {
			background: #e7dfd3;
		}
		form {
			display: flex;
			gap: 0.5rem;
			margin-bottom: 1.2rem;
		}
		input[type="text"] {
			flex: 1;
			padding: 0.5rem 0.8rem;
			border: 1px solid #e7dfd3;
			border-radius: 6px;
			font-size: 1rem;
			background: #f9f6f2;
			color: #6d5c3d;
			transition: border 0.2s;
		}
		input[type="text"]:focus {
			border: 1.5px solid #c8bfae;
			outline: none;
		}
		button[type="submit"] {
			padding: 0.5rem 1.1rem;
			border: none;
			background: #f3ede7;
			color: #6d5c3d;
			border-radius: 6px;
			cursor: pointer;
			font-size: 1rem;
			font-weight: 500;
			box-shadow: 0 1px 4px rgba(180, 160, 120, 0.04);
			transition: background 0.2s, box-shadow 0.2s;
		}
		button[type="submit"]:hover {
			background: #e7dfd3;
			box-shadow: 0 2px 8px rgba(180, 160, 120, 0.07);
		}
		ul {
			list-style: none;
			padding: 0;
			margin: 0;
		}
		li {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0.5rem 0.2rem 0.5rem 0;
			border-bottom: 1px solid #f3ede7;
			font-size: 1.05rem;
			font-weight: normal;
			transition: background 0.15s;
		}
		.todo-text {
			font-weight: normal;
		}
		li:last-child {
			border-bottom: none;
		}
		.todo-content {
			display: flex;
			align-items: center;
			gap: 0.7rem;
			flex: 1;
			min-width: 0;
		}
		.todo-checkbox {
			accent-color: #c8bfae;
			width: 1.1rem;
			height: 1.1rem;
			margin-right: 0.2rem;
		}
		.todo-text {
			flex: 1;
			word-break: break-word;
			transition: color 0.2s;
		}
		.completed .todo-text {
			text-decoration: line-through;
			color: #b8a88a;
		}
		.remove-btn {
			background: none;
			border: none;
			cursor: pointer;
			margin-left: 0.7rem;
			padding: 0.2rem;
			display: flex;
			align-items: center;
			transition: background 0.2s;
		}
		.remove-btn svg {
			width: 18px;
			height: 18px;
			fill: #c8bfae;
			transition: fill 0.2s;
		}
		.remove-btn:hover svg {
			fill: #6d5c3d;
		}
	</style>
</head>
<body>
	<div class="todo-container">
		<h1>Todo Lists</h1>
		<div class="list-controls">
			<select id="list-select" class="list-select"></select>
			<input type="text" id="list-input" class="list-input" placeholder="New list name" />
			<button id="list-add-btn" class="list-add-btn">+</button>
		</div>
		<div id="all-lists-section" class="all-lists-section"></div>
		<form id="todo-form">
			<input type="text" id="todo-input" placeholder="Add a new todo..." autocomplete="off" required />
			<button type="submit">Add</button>
		</form>
		<ul id="todo-list"></ul>
	</div>
	<script>
		// Font and color are set in CSS for a neutral, aesthetic look
		// --- Multiple Lists Feature ---
		const form = document.getElementById('todo-form');
		const input = document.getElementById('todo-input');
		const list = document.getElementById('todo-list');
		const listSelect = document.getElementById('list-select');
		const listInput = document.getElementById('list-input');
		const listAddBtn = document.getElementById('list-add-btn');

		// Store lists in memory (could use localStorage for persistence)
		let lists = {
			'Default': []
		};
		let currentList = 'Default';

		// --- List Management ---
		const allListsSection = document.getElementById('all-lists-section');

		function updateListSelect() {
			listSelect.innerHTML = '';
			Object.keys(lists).forEach(listName => {
				const option = document.createElement('option');
				option.value = listName;
				option.textContent = listName;
				if (listName === currentList) option.selected = true;
				listSelect.appendChild(option);
			});
			renderAllListsSection();
		}

		function renderAllListsSection() {
			allListsSection.innerHTML = '';
			Object.keys(lists).forEach(listName => {
				const box = document.createElement('div');
				box.className = 'list-box' + (listName === currentList ? ' selected' : '');
				box.title = 'Switch to ' + listName;
				box.onclick = function() {
					if (currentList !== listName) {
						currentList = listName;
						updateListSelect();
						renderTodos();
					}
				};
				const nameDiv = document.createElement('div');
				nameDiv.className = 'list-name';
				nameDiv.textContent = listName;
				const countDiv = document.createElement('div');
				countDiv.className = 'list-count';
				countDiv.textContent = lists[listName].length + ' item' + (lists[listName].length === 1 ? '' : 's');
				box.appendChild(nameDiv);
				box.appendChild(countDiv);
				allListsSection.appendChild(box);
			});
		}

		listAddBtn.addEventListener('click', function(e) {
			e.preventDefault();
			const name = listInput.value.trim();
			if (name && !lists[name]) {
				lists[name] = [];
				currentList = name;
				updateListSelect();
				renderTodos();
				listInput.value = '';
			}
		});

		listSelect.addEventListener('change', function() {
			currentList = listSelect.value;
			renderTodos();
		});

		// --- Todo Management ---
		form.addEventListener('submit', function(e) {
			e.preventDefault();
			const text = input.value.trim();
			if (text !== '') {
				addTodo(text);
				input.value = '';
				input.focus();
			}
		});

		function addTodo(text) {
			lists[currentList].push({ text, completed: false });
			renderTodos();
		}

		function toggleTodo(index) {
			lists[currentList][index].completed = !lists[currentList][index].completed;
			renderTodos();
		}

		function removeTodo(index) {
			lists[currentList].splice(index, 1);
			renderTodos();
		}

		function renderTodos() {
			list.innerHTML = '';
			lists[currentList].forEach((todo, idx) => {
				const li = document.createElement('li');
				if (todo.completed) li.classList.add('completed');

				// Content wrapper for checkbox and text
				const contentDiv = document.createElement('div');
				contentDiv.className = 'todo-content';

				// Checkbox
				const checkbox = document.createElement('input');
				checkbox.type = 'checkbox';
				checkbox.className = 'todo-checkbox';
				checkbox.checked = todo.completed;
				checkbox.addEventListener('change', function() {
					toggleTodo(idx);
				});

				// Todo text
				const span = document.createElement('span');
				span.className = 'todo-text';
				span.textContent = todo.text;

				contentDiv.appendChild(checkbox);
				contentDiv.appendChild(span);
				li.appendChild(contentDiv);

				// Trashcan icon button
				const btn = document.createElement('button');
				btn.className = 'remove-btn';
				btn.title = 'Remove';
				btn.innerHTML = `<svg viewBox="0 0 20 20"><path d="M7.5 8.5a.5.5 0 0 1 .5.5v5a.5.5 0 0 1-1 0v-5a.5.5 0 0 1 .5-.5zm2.5.5a.5.5 0 0 1 1 0v5a.5.5 0 0 1-1 0v-5zm3-4A1.5 1.5 0 0 0 12 3.5h-4A1.5 1.5 0 0 0 6.5 5v1H3a.5.5 0 0 0 0 1h.54l.82 9.04A2 2 0 0 0 6.35 18h7.3a2 2 0 0 0 1.99-1.96l.82-9.04H17a.5.5 0 0 0 0-1h-3.5v-1zM7.5 5A.5.5 0 0 1 8 4.5h4a.5.5 0 0 1 .5.5v1h-5v-1zm7.13 2l-.8 8.84a1 1 0 0 1-.99.96h-7.3a1 1 0 0 1-.99-.96L4.75 7h9.88z"/></svg>`;
				btn.addEventListener('click', function() {
					removeTodo(idx);
				});
				li.appendChild(btn);

				list.appendChild(li);
			});
		}

		// Initialize
		updateListSelect();
		renderTodos();
	</script>
</body>
</html>
