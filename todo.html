
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Simple Todo App</title>
	<style>
		body {
			font-family: 'Times New Roman', Times, serif;
			font-weight: normal;
			background: linear-gradient(120deg, #f6f5f2 0%, #f3ede7 100%);
			margin: 0;
			padding: 0;
			display: flex;
			justify-content: center;
			align-items: flex-start;
			min-height: 100vh;
		}
		.todo-container {
			background: #fffaf6;
			padding: 2.2rem 1.7rem 1.7rem 1.7rem;
			margin-top: 3rem;
			border-radius: 14px;
			box-shadow: 0 2px 16px rgba(180, 160, 120, 0.07);
			width: 100%;
			max-width: 440px;
			transition: box-shadow 0.2s;
			border: 1.5px solid #f0e7da;
		}
		.all-lists-section {
			display: flex;
			flex-wrap: wrap;
			gap: 0.7rem;
			margin-bottom: 1.2rem;
			justify-content: flex-start;
		}
		.list-box {
			background: #f7f3ee;
			border: 1.5px solid #e7dfd3;
			border-radius: 8px;
			padding: 0.5rem 1rem;
			min-width: 90px;
			font-size: 1rem;
			color: #6d5c3d;
			cursor: pointer;
			transition: background 0.18s, border 0.18s;
			display: flex;
			flex-direction: column;
			align-items: center;
		}
		.list-box.selected {
			background: #f3ede7;
			border: 2px solid #c8bfae;
			font-weight: bold;
		}
		.list-box .list-name {
			font-size: 1.05rem;
			margin-bottom: 0.2rem;
		}
		.list-box .list-count {
			font-size: 0.92rem;
			color: #b8a88a;
		}
		.todo-container:hover {
			box-shadow: 0 6px 28px rgba(180, 160, 120, 0.13);
		}
		h1 {
			text-align: center;
			color: #6d5c3d;
			font-weight: bold;
			letter-spacing: 0.5px;
			margin-bottom: 1.2rem;
		}
		.list-controls {
			display: flex;
			gap: 0.5rem;
			margin-bottom: 1.2rem;
			justify-content: center;
		}
		.list-select, .list-input, .list-add-btn {
			font-family: inherit;
			font-size: 1rem;
			border-radius: 6px;
			border: 1px solid #e7dfd3;
			padding: 0.4rem 0.7rem;
			background: #f7f3ee;
			color: #6d5c3d;
		}
		.list-select:focus, .list-input:focus {
			outline: none;
			border-color: #c8bfae;
		}
		.list-add-btn {
			background: #f3ede7;
			border: 1px solid #e7dfd3;
			color: #6d5c3d;
			cursor: pointer;
			padding: 0.4rem 0.9rem;
			transition: background 0.2s;
		}
		.list-add-btn:hover {
			background: #e7dfd3;
		}
		form {
			display: flex;
			gap: 0.5rem;
			margin-bottom: 1.2rem;
		}
		input[type="text"] {
			flex: 1;
			padding: 0.5rem 0.8rem;
			border: 1px solid #e7dfd3;
			border-radius: 6px;
			font-size: 1rem;
			background: #f9f6f2;
			color: #6d5c3d;
			transition: border 0.2s;
		}
		input[type="text"]:focus {
			border: 1.5px solid #c8bfae;
			outline: none;
		}
		button[type="submit"] {
			padding: 0.5rem 1.1rem;
			border: none;
			background: #f3ede7;
			color: #6d5c3d;
			border-radius: 6px;
			cursor: pointer;
			font-size: 1rem;
			font-weight: 500;
			box-shadow: 0 1px 4px rgba(180, 160, 120, 0.04);
			transition: background 0.2s, box-shadow 0.2s;
		}
		button[type="submit"]:hover {
			background: #e7dfd3;
			box-shadow: 0 2px 8px rgba(180, 160, 120, 0.07);
		}
		ul {
			list-style: none;
			padding: 0;
			margin: 0;
		}
		li {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 0.5rem 0.2rem 0.5rem 0;
			border-bottom: 1px solid #f3ede7;
			font-size: 1.05rem;
			font-weight: normal;
			transition: background 0.15s;
		}
		.todo-text {
			font-weight: normal;
		}
		li:last-child {
			border-bottom: none;
		}
		.todo-content {
			display: flex;
			align-items: center;
			gap: 0.7rem;
			flex: 1;
			min-width: 0;
		}
		.todo-checkbox {
			accent-color: #c8bfae;
			width: 1.1rem;
			height: 1.1rem;
			margin-right: 0.2rem;
		}
		.todo-text {
			flex: 1;
			word-break: break-word;
			transition: color 0.2s;
		}
		.completed .todo-text {
			text-decoration: line-through;
			color: #b8a88a;
		}
		.remove-btn {
			background: none;
			border: none;
			cursor: pointer;
			margin-left: 0.7rem;
			padding: 0.2rem;
			display: flex;
			align-items: center;
			transition: background 0.2s;
		}
		.remove-btn svg {
			width: 18px;
			height: 18px;
			fill: #c8bfae;
			transition: fill 0.2s;
		}
		.remove-btn:hover svg {
			fill: #6d5c3d;
		}
	</style>
</head>
<body>
	<div class="todo-container">
		<h1>Todo Lists</h1>
		<div class="list-controls">
			<select id="list-select" class="list-select"></select>
			<input type="text" id="list-input" class="list-input" placeholder="New list name" />
			<button id="list-add-btn" class="list-add-btn">+</button>
		</div>
		<div id="all-lists-section" class="all-lists-section"></div>
		<form id="todo-form">
			<input type="text" id="todo-input" placeholder="Add a new todo..." autocomplete="off" required />
			<button type="submit">Add</button>
		</form>
		<ul id="todo-list"></ul>
	</div>
	<script src="js/todo.js"></script>
</body>
</html>
